<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>피콕이의 모바일 가계부 🦚</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans antialiased max-w-md mx-auto min-h-screen shadow-lg flex flex-col select-none">

    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white p-6 rounded-b-3xl shadow-md sticky top-0 z-20">
        <p class="text-sm text-blue-100 opacity-80">피콕이의 현재 잔액</p>
        <h1 class="text-3xl font-extrabold mt-1"><span id="balance-view">0</span> 원</h1>
    </header>

    <main class="p-4 flex-1 overflow-y-auto space-y-6">
        <section id="form-section" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 transition-all">
            <h2 id="form-title" class="text-sm font-bold text-gray-500 mb-3">💸 새로운 거래 기록하기</h2>
            <form id="account-form" class="space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <input type="date" id="form-date" class="border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-blue-500" required>
                    <select id="form-category" class="border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-blue-500" required>
                        <option value="INC_ALLOWANCE">💰 정기용돈</option>
                        <option value="INC_CHORE">🧼 집안일 보상</option>
                        <option value="EXP_SNACK">🍦 간식/디저트</option>
                        <option value="EXP_SCHOOL">✏️ 학교/준비물</option>
                    </select>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <input type="number" id="form-amount" placeholder="금액 (원)" class="col-span-1 border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-blue-500" required min="1">
                    <input type="text" id="form-note" placeholder="메모를 적어주세요 (예: 메로나)" class="col-span-2 border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-blue-500">
                </div>
                <div class="flex space-x-2">
                    <button type="button" id="cancel-edit-btn" class="hidden w-1/3 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold p-3 rounded-xl text-sm transition-all shadow-sm" onclick="clearFormState()">
                        수정 취소
                    </button>
                    <button type="submit" id="submit-btn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold p-3 rounded-xl text-sm transition-all shadow-sm">
                        금고에 기록 저장하기
                    </button>
                </div>
            </form>
        </section>

        <section class="space-y-3">
            <h2 class="text-sm font-bold text-gray-500 px-1">📅 거래 내역 및 잔액 로그 <span class="text-[10px] text-gray-400 font-normal ml-1">(모바일: 밀어서 관리 / PC: 클릭 메뉴)</span></h2>
            <div id="history-list" class="space-y-2.5"></div>
        </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>

    <script>
        // 전역 메모리 캐시 및 에디터 포인터 상태값
        let activeRecords = []; 
        let editingId = null;   

        document.getElementById('form-date').value = new Date().toISOString().substring(0, 10);

        // 1. [GET 요청] 내역 로드 및 하이브리드 UI 뷰포트 드로잉
        async function fetchAndRender() {
            try {
                const response = await fetch('/api/history');
                const data = await response.json();
                
                activeRecords = data.map(item => ({
                    ...item,
                    type: item.etc1_value,
                    date: item.pay_date,
                    category_name: item.code_name_han
                }));

                let runningTotal = 0;
                const dataWithRunningTotal = [...activeRecords].reverse().map(item => {
                    if (item.type === 'INCOME') {
                        runningTotal += item.amount;
                    } else if (item.type === 'EXPENSE') {
                        runningTotal -= item.amount;
                    }
                    return { ...item, calculatedBalance: runningTotal };
                });

                document.getElementById('balance-view').innerText = runningTotal.toLocaleString();

                const htmlList = dataWithRunningTotal.reverse().map(item => {
                    const isIncome = item.type === 'INCOME';
                    const colorClass = isIncome ? 'text-red-500 font-semibold' : 'text-blue-500 font-semibold';
                    const sign = isIncome ? '+' : '-';
                    
                    return `
                        <div class="card-container relative overflow-visible rounded-2xl h-[76px] bg-gray-100 border border-gray-100 shadow-sm transition-all duration-200 z-10" data-id="${item.id}">
                            
                            <div class="absolute inset-y-0 right-0 w-[180px] flex z-0 rounded-r-2xl overflow-hidden">
                                <button type="button" class="w-[60px] h-full bg-gray-300 text-gray-700 text-sm font-bold flex items-center justify-center active:bg-gray-400" onclick="closeSwipe(this)">닫기</button>
                                <button type="button" class="w-[60px] h-full bg-amber-500 text-white text-base font-bold flex items-center justify-center active:bg-amber-600" onclick="startEdit(${item.id})">✏️</button>
                                <button type="button" class="w-[60px] h-full bg-emerald-500 text-white text-base font-bold flex items-center justify-center active:bg-emerald-600" onclick="deleteHistory(${item.id})">⭕</button>
                            </div>
                            
                            <div class="card-content group absolute inset-0 z-10 bg-white flex justify-between items-center px-4 rounded-2xl transition-transform duration-300 ease-out">
                                <div class="flex items-center space-x-2">
                                    <div>
                                        <p class="text-xs text-gray-400 font-medium">${item.date.substring(4,6)}월 ${item.date.substring(6,8)}일</p>
                                        <h3 class="text-sm font-bold text-gray-800 mt-0.5 truncate max-w-[150px]">${item.note || item.category_name}</h3>
                                        <p class="text-xs text-gray-400 mt-0.5">잔액: ${item.calculatedBalance.toLocaleString()}원</p>
                                    </div>
                                </div>
                                
                                <div class="text-right flex items-center space-x-3">
                                    <div class="flex flex-col items-end justify-center">
                                        <span class="${colorClass} text-base">${sign}${item.amount.toLocaleString()} 원</span>
                                        <p class="text-[10px] bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded-md mt-1 inline-block">${item.category_name}</p>
                                    </div>

                                    <div class="relative inline-block text-left overflow-visible">
                                        <button type="button" class="md:opacity-0 group-hover:opacity-100 text-gray-400 hover:text-gray-600 p-1 rounded-full text-lg font-bold transition-opacity" onclick="toggleBalloon(this, event)">
                                            ⋮
                                        </button>
                                        <div class="balloon-menu hidden absolute right-0 mt-1 w-28 bg-white border border-gray-200 rounded-xl shadow-xl z-50 overflow-hidden">
                                            <button type="button" class="w-full text-left px-3 py-2 text-xs text-amber-600 hover:bg-amber-50 font-semibold flex justify-between" onclick="startEdit(${item.id})">
                                                <span>수정하기</span> <span>✏️</span>
                                            </button>
                                            <button type="button" class="w-full text-left px-3 py-2 text-xs text-emerald-600 hover:bg-emerald-50 border-t border-gray-100 font-semibold flex justify-between" onclick="deleteHistory(${item.id})">
                                                <span>지우기</span> <span>⭕</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    `;
                }).join('');

                document.getElementById('history-list').innerHTML = htmlList || '<p class="text-center text-sm text-gray-400 py-6">아직 기록이 없습니다. 첫 수입을 입력해봐요!</p>';

            } catch (error) {
                console.error("데이터 동기화 실패 버그 발생:", error);
            }
        }

        // 2. [POST 및 PUT 통합 관리] 폼 제출 이벤트 핸들러
        document.getElementById('account-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pay_date = document.getElementById('form-date').value.replace(/-/g, "");
            const category_sub_code = document.getElementById('form-category').value;
            const amount = parseInt(document.getElementById('form-amount').value);
            const note = document.getElementById('form-note').value;

            // 라우터 분기 처리 및 하이브리드 바인딩
            const url = editingId ? `/api/history/${editingId}` : '/api/history';
            const method = editingId ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pay_date, category_sub_code, amount, note })
                });

                if (response.ok) {
                    clearFormState(); // 입력 및 모드 리셋
                    fetchAndRender();
                } else {
                    alert("가계부 전송 처리 중 문제가 생겼단다.");
                }
            } catch (error) {
                alert("통신 장애 발생!");
            }
        });

        // 🔥 [수정 모드 활성화 엔진] 선택한 내역을 찾아서 인풋 박스에 복사 가동
        function startEdit(id) {
            closeAllBalloons();
            // 스와이프 열린 카드 원위치
            document.querySelectorAll('.card-content').forEach(c => c.style.transform = 'translateX(0px)');

            const target = activeRecords.find(item => item.id === id);
            if (!target) return;

            editingId = id; // 수정 중인 타겟 ID 고정

            // 1. 날짜 포맷팅 변환 (YYYYMMDD -> YYYY-MM-DD)
            const rawDate = target.pay_date;
            const formattedDate = `${rawDate.substring(0,4)}-${rawDate.substring(4,6)}-${rawDate.substring(6,8)}`;
            
            // 2. 폼 필드 채워넣기
            document.getElementById('form-date').value = formattedDate;
            document.getElementById('form-category').value = target.category_sub_code;
            document.getElementById('form-amount').value = target.amount;
            document.getElementById('form-note').value = target.note || '';

            // 3. UI 컴포넌트 시각 형태 피드백 전환
            document.getElementById('form-section').classList.remove('bg-white');
            document.getElementById('form-section').classList.add('bg-amber-50', 'border-amber-200');
            document.getElementById('form-title').innerText = "✏️ 가계부 내역 수정 모드 가동 중";
            document.getElementById('submit-btn').innerText = "기록 수정 완료하기";
            document.getElementById('submit-btn').classList.remove('bg-blue-600', 'hover:bg-blue-700');
            document.getElementById('submit-btn').classList.add('bg-amber-600', 'hover:bg-amber-700');
            document.getElementById('cancel-edit-btn').classList.remove('hidden');

            // 스크롤 상단으로 부드럽게 이동하여 사용성을 확보
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 🔥 [수정 모드 강제 해제 장치] 폼 상태 초기화
        function clearFormState() {
            editingId = null;
            document.getElementById('form-date').value = new Date().toISOString().substring(0, 10);
            document.getElementById('form-category').selectedIndex = 0;
            document.getElementById('form-amount').value = '';
            document.getElementById('form-note').value = '';

            // 스타일 원상 복구
            document.getElementById('form-section').classList.remove('bg-amber-50', 'border-amber-200');
            document.getElementById('form-section').classList.add('bg-white');
            document.getElementById('form-title').innerText = "💸 새로운 거래 기록하기";
            document.getElementById('submit-btn').innerText = "금고에 기록 저장하기";
            document.getElementById('submit-btn').classList.remove('bg-amber-600', 'hover:bg-amber-700');
            document.getElementById('submit-btn').classList.add('bg-blue-600', 'hover:bg-blue-700');
            document.getElementById('cancel-edit-btn').classList.add('hidden');
        }

        // 3. [DELETE 요청] 데이터베이스 행 파괴
        async function deleteHistory(id) {
            if(editingId === id) {
                alert("현재 수정 중인 데이터는 지울 수 없단다. 먼저 수정을 취소하렴!");
                return;
            }
            try {
                const response = await fetch(`/api/history/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    fetchAndRender(); 
                } else {
                    alert("삭제 실패!");
                }
            } catch (error) {
                console.error("삭제 통신 에러:", error);
            }
        }

        function closeSwipe(btnElement) {
            const container = btnElement.closest('.card-container');
            if (container) {
                const content = container.querySelector('.card-content');
                if (content) content.style.transform = 'translateX(0px)';
            }
        }

        function toggleBalloon(btnElement, event) {
            event.stopPropagation();
            const container = btnElement.closest('.card-container');
            const currentMenu = btnElement.nextElementSibling;
            const isHidden = currentMenu.classList.contains('hidden');
            
            closeAllBalloons();
            
            if (isHidden) {
                currentMenu.classList.remove('hidden');
                if (container) {
                    container.classList.remove('z-10');
                    container.classList.add('z-30');
                }
            }
        }

        function closeAllBalloons() {
            document.querySelectorAll('.balloon-menu').forEach(menu => {
                menu.classList.add('hidden');
            });
            document.querySelectorAll('.card-container').forEach(container => {
                container.classList.remove('z-30');
                container.classList.add('z-10');
            });
        }

        document.addEventListener('click', closeAllBalloons);

        // 5. [TOUCH 모바일 제스처 엔진] 3개의 버튼 너비인 180px만큼 임계점 및 연산 수정
        let touchStartX = 0;
        let touchEndX = 0;
        const listWrapper = document.getElementById('history-list');

        listWrapper.addEventListener('touchstart', (e) => {
            closeAllBalloons();
            const content = e.target.closest('.card-content');
            if (!content) return;
            touchStartX = e.touches[0].clientX;
        }, { passive: true });

        listWrapper.addEventListener('touchend', (e) => {
            const content = e.target.closest('.card-content');
            if (!content) return;
            
            touchEndX = e.changedTouches[0].clientX;
            const diffX = touchStartX - touchEndX;
            
            // 💡 세 가지 제어판이 노출되도록 수동 연산 영역을 -180px로 가공
            if (diffX > 45) {
                document.querySelectorAll('.card-content').forEach(c => c.style.transform = 'translateX(0px)');
                content.style.transform = 'translateX(-180px)';
            } 
            else if (diffX < -45) {
                content.style.transform = 'translateX(0px)';
            }
        }, { passive: true });

        // 6. [웹소켓] 실시간 주파수 신호 연동 안정화
        const socket = io();
        socket.on('database_changed', (data) => {
            console.log("⚡ 실시간 주파수 신호 감지됨:", data.message);
            fetchAndRender();
        });

        fetchAndRender();
    </script>
</body>
</html>
